name: CI/CD
on: push
permissions:
  contents: read
  id-token: write

jobs:
  black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: psf/black@stable
        with:
          options: "--check"
  pyright:
    name: pyright
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        cache: 'pip'
    - name: Run pyright
      run: |
        pip install "pyright>=1.1,<2"
        pyright
  isort:
    name: isort
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        cache: 'pip'
    - name: Run isort
      run: |
        pip install "isort>=6.0,<6.1"
        isort -c .
  test:
    name: run tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Run test
      run: |
        pip install pytest-cov
        pytest --junitxml=pytest.xml --cov-report=term-missing:skip-covered --cov=unit_of_time timetest.py
    - name: Coveralls
      uses: coverallsapp/github-action@v2
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
    steps:
    - name: checkout code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - run: |
        pip install 'setuptools>=38.6.0,<69.0' twine>=1.11.0 wheel>=0.31.0 setuptools_scm>=6.2
        python -m setuptools_scm
        python setup.py sdist bdist_wheel
  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [black, build, test, pyright]
    steps:
    - name: checkout code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
    - run: |
        pip install 'setuptools>=38.6.0,<69.0' twine>=1.11.0 wheel>=0.31.0 setuptools_scm>=6.2
        python -m setuptools_scm
        python setup.py sdist bdist_wheel
    - name: Publish package
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        verbose: true
        password: ${{ secrets.PYPI_TOKEN }}
